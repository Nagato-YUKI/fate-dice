        /* 龙鳞纹理层 */
        .dragon-scales {
            position: fixed;
            inset: 0;
            background-image:
                radial-gradient(ellipse 22px 18px at 50% 50%, rgba(201,169,97,0.045) 0%, rgba(201,169,97,0.02) 70%, transparent 100%);
            background-size: 44px 36px;
            pointer-events: none;
            z-index: 0;
            opacity: 0.7;
        }

        /* DND 装饰背景：符文圆环 + 魔法阵 */
        .bg-decor { position: fixed; inset: 0; pointer-events: none; z-index: 0; color: var(--dark-gold); }
        .rune-ring { position: absolute; width: 220px; height: 220px; opacity: 0.18; }
        .rune-ring.tl { top: 20px; left: 20px; }
        .rune-ring.tr { top: 20px; right: 20px; transform: scaleX(-1); }
        .rune-ring.bl { bottom: 20px; left: 20px; transform: scaleY(-1); }
        .rune-ring.br { bottom: 20px; right: 20px; transform: scale(-1,-1); }

        .magic-circle {
            position: absolute;
            top: 50%; left: 50%;
            width: 520px; height: 520px;
            transform: translate(-50%, -50%);
            opacity: 0.05;
            animation: slowSpin 120s linear infinite;
        }
        @keyframes slowSpin { to { transform: translate(-50%, -50%) rotate(360deg); } }

        /* 烛光摇曳 */
        .candle-glow {
            position: fixed;
            width: 360px;
            height: 360px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(201,169,97,0.18) 0%, rgba(201,169,97,0.05) 40%, transparent 70%);
            pointer-events: none;
            animation: flicker 4s ease-in-out infinite;
            z-index: 0;
        }
        .candle-glow.tl { top: -120px; left: -120px; }
        .candle-glow.tr { top: -120px; right: -120px; animation-delay: 0.7s; }
        .candle-glow.bl { bottom: -120px; left: -120px; animation-delay: 1.4s; }
        .candle-glow.br { bottom: -120px; right: -120px; animation-delay: 2.1s; }
        @keyframes flicker {
            0%, 100% { opacity: 0.7; transform: scale(1); }
            25% { opacity: 0.9; transform: scale(1.06); }
            50% { opacity: 0.55; transform: scale(0.96); }
            75% { opacity: 0.8; transform: scale(1.03); }
        }

        /* 微光粒子 */
        .particles { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 0; }
        .particle {
            position: absolute;
            bottom: -10px;
            width: 3px;
            height: 3px;
            background: rgba(201,169,97,0.7);
            border-radius: 50%;
            box-shadow: 0 0 6px rgba(201,169,97,0.5);
            animation: floatUp linear infinite;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) translateX(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-105vh) translateX(30px); opacity: 0; }
        }

        /* 容器：羊皮纸卷轴 */
        .container {
            position: relative;
            z-index: 1;
            background:
                linear-gradient(rgba(58,36,24,0.55), rgba(26,18,10,0.65)),
                linear-gradient(135deg, rgba(232,213,163,0.04), rgba(232,213,163,0.08));
            border: 3px solid var(--dark-gold);
            border-radius: 20px;
            padding: 36px 40px 44px;
            max-width: 700px;
            width: 100%;
            box-shadow:
                0 0 0 1px rgba(58,36,24,0.8),
                0 0 40px rgba(201,169,97,0.15),
                0 20px 60px rgba(0,0,0,0.7),
                inset 0 0 60px rgba(0,0,0,0.4);
        }
        .container::before, .container::after {
            content: '';
            position: absolute;
            left: 14px;
            right: 14px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--dark-gold), transparent);
            opacity: 0.5;
        }
        .container::before { top: 10px; }
        .container::after { bottom: 10px; }

        /* 卷轴边角装饰 */
        .corner-orn { position: absolute; width: 46px; height: 46px; color: var(--dark-gold); opacity: 0.65; pointer-events: none; }
        .corner-orn.tl { top: 6px; left: 6px; }
        .corner-orn.tr { top: 6px; right: 6px; transform: scaleX(-1); }
        .corner-orn.bl { bottom: 6px; left: 6px; transform: scaleY(-1); }
        .corner-orn.br { bottom: 6px; right: 6px; transform: scale(-1,-1); }

        /* 标题 */
        .header { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 24px; }
        .header-titles { min-width: 0; }
        .header h1 {
            font-family: var(--font-title);
            font-size: 30px;
            font-weight: 900;
            color: var(--dark-gold);
            letter-spacing: 2px;
            line-height: 1.15;
            text-shadow:
                0 2px 6px rgba(0,0,0,0.7),
                0 0 18px rgba(201,169,97,0.35),
                0 1px 0 #6b4f1e,
                -1px -1px 0 #8a6f2e,
                1px 1px 0 #4a3318;
        }
        .header h1 .sub-title { display: block; color: var(--parchment); font-weight: 400; font-size: 16px; letter-spacing: 4px; margin-top: 2px; text-shadow: 0 1px 3px rgba(0,0,0,0.6); }
        .header-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
        .header-icon { color: var(--dark-gold); filter: drop-shadow(0 0 8px rgba(201,169,97,0.4)); flex-shrink: 0; }

        /* 静音按钮 */
        .sound-toggle {
            background: rgba(26,18,10,0.5);
            border: 1px solid var(--dark-gold);
            border-radius: 50%;
            width: 40px; height: 40px;
            cursor: pointer;
            color: var(--dark-gold);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }
        .sound-toggle:hover { box-shadow: 0 0 12px rgba(201,169,97,0.45); transform: translateY(-1px); }
        .sound-toggle svg { width: 20px; height: 20px; }
        .sound-toggle .icon-off { display: none; }
        .sound-toggle.muted .icon-on { display: none; }
        .sound-toggle.muted .icon-off { display: block; }
        .sound-toggle.muted { color: var(--parchment); opacity: 0.55; }

        /* 结果区：卷轴铭文 */
        .result-area {
            background:
                linear-gradient(rgba(232,213,163,0.06), rgba(232,213,163,0.02)),
                rgba(26,18,10,0.4);
            border: 1px solid rgba(201,169,97,0.35);
            border-radius: 14px;
            padding: 22px 18px 20px;
            margin-bottom: 26px;
            text-align: center;
            min-height: 240px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 10px;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.5);
        }
        .roll-label {
            font-family: var(--font-title);
            font-size: 14px;
            font-weight: 600;
            color: var(--dark-gold);
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.85;
        }
        .dice-stage {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 14px;
            min-height: var(--dice-size);
            padding: 6px 0;
        }
        .dice-result {
            font-family: var(--font-rune);
            font-size: var(--result-font);
            color: var(--dark-gold);
            line-height: 1;
            text-shadow: 0 0 20px rgba(201,169,97,0.6), 0 2px 6px rgba(0,0,0,0.7);
            min-height: 1em;
        }
        .dice-result.crit { color: var(--blood-red); text-shadow: 0 0 24px rgba(139,44,44,0.7), 0 2px 6px rgba(0,0,0,0.7); }
        .dice-detail {
            font-family: var(--font-body);
            font-size: 18px;
            color: var(--parchment);
            opacity: 0.9;
            min-height: 1.2em;
        }
        .dice-detail strong { color: var(--dark-gold); font-weight: 600; }
        .crit-tag { color: var(--blood-red); font-weight: 600; font-family: var(--font-title); letter-spacing: 1px; margin-left: 6px; }
        .rolling-hint { color: var(--ink-green); font-style: italic; opacity: 0.85; }

        /* 3D 骰子（CSS 3D 立方体） */
        .dice-3d-stage {
            width: var(--dice-size);
            height: var(--dice-size);
            position: relative;
            perspective: 800px;
        }
        .dice-cube {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transform: rotateX(-25deg) rotateY(-30deg);
            transition: transform 1.2s cubic-bezier(0.25, 0.8, 0.35, 1);
        }
        .dice-cube.rolling {
            animation: diceRoll 1.2s ease-out forwards;
        }
        @keyframes diceRoll {
            0%   { transform: rotateX(-20deg) rotateY(-20deg) rotateZ(0deg); }
            100% { transform: rotateX(700deg) rotateY(1060deg) rotateZ(360deg); }
        }
        .dice-face {
            position: absolute;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(circle at 30% 30%, rgba(255, 232, 176, 0.35), transparent 60%),
                linear-gradient(135deg, #d4a84a 0%, #b8862e 50%, #8a5a20 100%);
            border: 3px solid #ffe8b0;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-rune);
            font-size: calc(var(--dice-size) * 0.42);
            font-weight: 700;
            color: #2a1608;
            text-shadow: 0 1px 0 rgba(255, 232, 176, 0.5);
            box-shadow:
                inset 0 0 20px rgba(0, 0, 0, 0.35),
                inset 0 0 6px rgba(255, 232, 176, 0.3);
            backface-visibility: hidden;
        }
        .dice-face.front  { transform: translateZ(calc(var(--dice-size) * 0.5)); }
        .dice-face.back   { transform: rotateY(180deg) translateZ(calc(var(--dice-size) * 0.5)); }
        .dice-face.right  { transform: rotateY(90deg)  translateZ(calc(var(--dice-size) * 0.5)); }
        .dice-face.left   { transform: rotateY(-90deg) translateZ(calc(var(--dice-size) * 0.5)); }
        .dice-face.top    { transform: rotateX(90deg)  translateZ(calc(var(--dice-size) * 0.5)); }
        .dice-face.bottom { transform: rotateX(-90deg) translateZ(calc(var(--dice-size) * 0.5)); }

        /* 多骰明细 */
        .multi-results { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px 10px; margin-top: 4px; }
        .single-die {
            background: rgba(58,36,24,0.6);
            border: 1px solid rgba(201,169,97,0.4);
            padding: 4px 14px;
            border-radius: 8px;
            font-family: var(--font-rune);
            font-size: 22px;
            color: var(--parchment);
        }
        .single-die.highlight {
            border-color: var(--blood-red);
            color: var(--dark-gold);
            box-shadow: 0 0 12px rgba(139,44,44,0.4);
        }
        .single-die.crit-success {
            border-color: var(--dark-gold);
            color: var(--dark-gold);
            background: rgba(201,169,97,0.18);
            box-shadow: 0 0 16px rgba(201,169,97,0.6);
        }
        .single-die.crit-fail {
            border-color: var(--blood-red);
            color: var(--blood-red);
            background: rgba(139,44,44,0.2);
            box-shadow: 0 0 14px rgba(139,44,44,0.55);
        }

        /* 骰子选择器：符文石碑 */
        .dice-selector { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 22px; }
        .dice-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(160deg, #3a2418, #241510);
            border: 2px solid var(--dark-gold);
            border-radius: 10px;
            padding: 9px 16px;
            font-family: var(--font-title);
            font-size: 17px;
            font-weight: 600;
            color: var(--dark-gold);
            cursor: pointer;
            transition: all 0.25s ease;
            min-width: 72px;
            justify-content: center;
            box-shadow: 0 3px 8px rgba(0,0,0,0.4), inset 0 1px 0 rgba(201,169,97,0.15);
        }
        .dice-btn .die-shape {
            width: 14px;
            height: 14px;
            background: var(--dark-gold);
            flex-shrink: 0;
            transition: background 0.25s ease;
        }
        .dice-btn .sub { font-size: 11px; font-weight: 400; opacity: 0.7; font-family: var(--font-body); }
        .dice-btn:hover {
            background: linear-gradient(160deg, #4a2e1c, #2a1810);
            box-shadow: 0 0 18px rgba(201,169,97,0.4), 0 4px 12px rgba(0,0,0,0.5), inset 0 1px 0 rgba(201,169,97,0.25);
            transform: translateY(-2px);
        }
        .dice-btn.active {
            background: linear-gradient(160deg, var(--dark-gold), #a8893e);
            border-color: var(--parchment);
            color: var(--deep-brown);
            box-shadow: 0 0 20px rgba(201,169,97,0.5), inset 0 1px 0 rgba(255,255,255,0.3);
        }
        .dice-btn.active .die-shape { background: var(--deep-brown); }

        /* 多面体几何图标 */
        .dice-btn[data-dice="4"] .die-shape { clip-path: polygon(50% 0%, 100% 100%, 0% 100%); }
        .dice-btn[data-dice="6"] .die-shape { clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%); }
        .dice-btn[data-dice="8"] .die-shape { clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); }
        .dice-btn[data-dice="10"] .die-shape { clip-path: polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%); }
        .dice-btn[data-dice="12"] .die-shape { clip-path: polygon(50% 0%, 93% 25%, 93% 75%, 50% 100%, 7% 75%, 7% 25%); }
        .dice-btn[data-dice="20"] .die-shape { clip-path: polygon(30% 0%, 70% 0%, 100% 30%, 100% 70%, 70% 100%, 30% 100%, 0% 70%, 0% 30%); }
        .dice-btn[data-dice="100"] .die-shape { clip-path: circle(50% at 50% 50%); }

        /* 控制区 */
        .controls { display: flex; flex-wrap: wrap; gap: 14px; align-items: center; justify-content: center; }
        .count-control {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(26,18,10,0.5);
            padding: 6px 14px;
            border-radius: 10px;
            border: 1px solid var(--dark-gold);
        }
        .count-control label {
            font-family: var(--font-title);
            color: var(--dark-gold);
            font-weight: 600;
            font-size: 14px;
            letter-spacing: 1px;
        }
        .count-control input {
            width: 56px;
            padding: 6px 4px;
            text-align: center;
            font-family: var(--font-rune);
            font-size: 18px;
            background: rgba(26,18,10,0.6);
            border: 1px solid rgba(201,169,97,0.4);
            border-radius: 6px;
            color: var(--parchment);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .count-control input:focus { border-color: var(--dark-gold); box-shadow: 0 0 0 2px rgba(201,169,97,0.25); }

        /* 掷骰按钮：暗金金属质感 */
        .roll-btn {
            background: linear-gradient(160deg, #d9b96e 0%, #c9a961 40%, #a8893e 100%);
            border: 2px solid #8a6f2e;
            border-radius: 10px;
            padding: 13px 40px;
            font-family: var(--font-title);
            font-size: 20px;
            font-weight: 700;
            color: var(--deep-brown);
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 6px 18px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.4), inset 0 -2px 4px rgba(0,0,0,0.2);
            letter-spacing: 2px;
            text-shadow: 0 1px 0 rgba(255,255,255,0.3);
        }
        .roll-btn:hover {
            background: linear-gradient(160deg, #e9c97e 0%, #d9b96e 40%, #b8994e 100%);
            box-shadow: 0 0 24px rgba(201,169,97,0.5), 0 8px 22px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.5);
            transform: translateY(-2px);
        }
        .roll-btn:active { transform: translateY(1px) scale(0.98); box-shadow: 0 3px 10px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.3); }
        .roll-btn:disabled { opacity: 0.55; cursor: not-allowed; transform: none; box-shadow: 0 3px 8px rgba(0,0,0,0.4); }

        /* 历史记录：羊皮纸手写便签 */
        .history { margin-top: 26px; padding-top: 18px; border-top: 1px solid rgba(201,169,97,0.25); }
        .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .history-header h3 {
            font-family: var(--font-title);
            font-size: 14px;
            font-weight: 600;
            color: var(--dark-gold);
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .clear-btn {
            background: none;
            border: 1px solid rgba(201,169,97,0.3);
            color: var(--parchment);
            opacity: 0.7;
            font-family: var(--font-body);
            font-size: 14px;
            cursor: pointer;
            padding: 4px 12px;
            border-radius: 6px;
            transition: all 0.2s;
        }
        .clear-btn:hover { color: var(--blood-red); border-color: var(--blood-red); opacity: 1; }
        .history-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            max-height: 110px;
            overflow-y: auto;
            padding-right: 4px;
        }
        .history-item {
            background: linear-gradient(160deg, rgba(45,74,62,0.28), rgba(26,18,10,0.4));
            border: 1px solid rgba(201,169,97,0.25);
            padding: 5px 14px;
            border-radius: 8px;
            font-family: var(--font-rune);
            font-size: 15px;
            color: var(--parchment);
            white-space: nowrap;
        }
        .history-item .h-dice { color: var(--dark-gold); font-weight: 600; }
        .history-item .h-result { color: var(--parchment); font-weight: 600; }
        .history-empty { color: rgba(232,213,163,0.4); font-size: 15px; font-style: italic; padding: 6px 0; }

        /* 焦点状态 */
        :focus-visible { outline: 2px solid var(--dark-gold); outline-offset: 2px; }
        button:focus-visible { box-shadow: 0 0 0 3px rgba(201,169,97,0.3); }

        /* 滚动条 */
        .history-list::-webkit-scrollbar { width: 6px; }
        .history-list::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 3px; }
        .history-list::-webkit-scrollbar-thumb { background: rgba(201,169,97,0.6); border-radius: 3px; }

        /* 响应式 */
        @media (max-width: 768px) {
            :root { --dice-size: 80px; --result-font: 64px; }
            .container { padding: 28px 24px 34px; }
            .header h1 { font-size: 26px; }
            .header h1 .sub-title { font-size: 14px; letter-spacing: 3px; }
            .magic-circle { width: 380px; height: 380px; }
            .rune-ring { width: 160px; height: 160px; }
        }
        @media (max-width: 375px) {
            :root { --dice-size: 60px; --result-font: 56px; }
            .container { padding: 22px 16px 28px; }
            .header h1 { font-size: 22px; }
            .header h1 .sub-title { font-size: 12px; letter-spacing: 2px; }
            .header-icon { width: 34px; height: 34px; }
            .sound-toggle { width: 34px; height: 34px; }
            .dice-btn { font-size: 15px; padding: 7px 12px; min-width: 60px; gap: 6px; }
            .dice-btn .die-shape { width: 11px; height: 11px; }
            .roll-btn { padding: 11px 28px; font-size: 17px; }
            .result-area { min-height: 200px; padding: 18px 14px 16px; }
            .rune-ring { width: 120px; height: 120px; }
        }

        /* 减少动效 */
        @media (prefers-reduced-motion: reduce) {
            .candle-glow, .particle, .magic-circle { animation: none; }
        }

        /* SEO/无障碍：视觉隐藏但屏幕阅读器和搜索引擎可见 */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }
    </style>
</head>

            function randomInt(min, max) {
                return Math.floor(Math.random() * (max - min + 1)) + min;
            }

            function clampCount(val) {
                if (isNaN(val) || val < 1) return 1;
                if (val > 20) return 20;
                return val;
            }

            function prefersReducedMotion() {
                return window.matchMedia('(prefers-reduced-motion: reduce)').matches;
            }

            // === CSS 3D 骰子（统一立方体模型） ===
            function createDice3D(result, sides) {
                const stage = document.createElement('div');
                stage.className = 'dice-3d-stage';

                const cube = document.createElement('div');
                cube.className = 'dice-cube';

                const faces = ['front', 'back', 'right', 'left', 'top', 'bottom'];
                const isPlaceholder = (result === '?' || result === undefined || result === null);
                const frontNum = isPlaceholder ? '?' : String(result);

                faces.forEach(function(face, idx) {
                    const faceEl = document.createElement('div');
                    faceEl.className = 'dice-face ' + face;
                    faceEl.textContent = idx === 0 ? frontNum : (isPlaceholder ? '?' : String(randomInt(1, sides)));
                    cube.appendChild(faceEl);
                });

                stage.appendChild(cube);
                return { stage: stage, cube: cube };
            }

                cube.classList.remove('rolling');

            let audioRoll = null, audioSuccess = null, audioFail = null;

            function base64ToArrayBuffer(base64) {
                var binary = atob(base64);
                var len = binary.length;
                var bytes = new Uint8Array(len);
                for (var i = 0; i < len; i++) {
                    bytes[i] = binary.charCodeAt(i);
                }
                return bytes.buffer;
            }

            // 确保 AudioContext 处于可播放状态。处理 suspended 和 interrupted 两种暂停状态。
            function ensureAudioRunning() {
                if (!audioCtx) {
                    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) { return Promise.reject(e); }
                }
                var s = audioCtx.state;
                if (s === 'running') return Promise.resolve();
                if (s === 'suspended') return audioCtx.resume();
                // iOS Safari 独有的 interrupted 状态（如来电、锁屏后恢复），必须重建 AudioContext
                if (s === 'interrupted') {
                    return audioCtx.close().then(function() {
                        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                        return audioCtx.resume();
                    });
                }
                return Promise.resolve();
            }

            let audioUnlocked = false;
            function unlockAudio() {
                if (audioUnlocked) return;
                ensureAudioRunning().then(function() {
                    // 播放静音缓冲区，正式激活音频系统
                    var buf = audioCtx.createBuffer(1, 1, 22050);
                    var src = audioCtx.createBufferSource();
                    src.buffer = buf;
                    src.connect(audioCtx.destination);
                    src.start(0);
                    audioUnlocked = true;
                    // 解锁完成后移除监听
                    document.removeEventListener('click', unlockAudio, true);
                    document.removeEventListener('touchend', unlockAudio, true);
                }).catch(function(){});
            }
            // 捕获阶段 + touchend（非 touchstart！iOS 只认 touchend/click 为有效用户激活事件）
            document.addEventListener('click', unlockAudio, true);
            document.addEventListener('touchend', unlockAudio, true);

            function getAudioEl(src) {
                const a = new Audio(src);
                a.preload = "auto";
                return a;
            }
            let rollBuffer = null;
            function loadRollBuffer() {
                if (rollBuffer) return Promise.resolve(rollBuffer);
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                // 同步解码 base64 → ArrayBuffer，避免 iOS WebKit 上 fetch(data:...) 兼容问题
                var b64 = SOUND_ROLL.split(',')[1];
                var arrayBuf = base64ToArrayBuffer(b64);
                return audioCtx.decodeAudioData(arrayBuf)
                    .then(function(decoded) {
                        rollBuffer = decoded;
                        return decoded;
                    });
            }
            function playRollSound() {
                if (!soundEnabled) return;
                try {
                    var p = ensureAudioRunning();
                    p.then(function() {
                        loadRollBuffer().then(function(buffer) {
                        const source = audioCtx.createBufferSource();
                        const gain = audioCtx.createGain();
                        const startT = audioCtx.currentTime;
                        const playDur = 1.1;
                        const fadeDur = 0.35;
                        const sustainEnd = startT + playDur - fadeDur;
                        source.buffer = buffer;
                        gain.gain.setValueAtTime(0.0001, startT);
                        gain.gain.exponentialRampToValueAtTime(0.3, startT + 0.03);
                        gain.gain.setValueAtTime(0.3, sustainEnd);
                        gain.gain.exponentialRampToValueAtTime(0.0001, startT + playDur);
                        source.connect(gain);
                        gain.connect(audioCtx.destination);
                        source.start(startT);
                        source.stop(startT + playDur);
                    }).catch(function(){});
                    });
                } catch(e) {}
            }
            function playSettleSound() {
                if (!soundEnabled) return;
            }
            function playCritSound() {
                if (!soundEnabled) return;
                try {
                    var p = ensureAudioRunning();
                    p.then(function() {
                    var now = audioCtx.currentTime;
                    // 双音调上扬：C5 → E5，营造胜利氛围
                    var o1 = audioCtx.createOscillator();
                    var g1 = audioCtx.createGain();
                    o1.type = 'sine';
                    o1.frequency.setValueAtTime(523, now);
                    g1.gain.setValueAtTime(0.0001, now);
                    g1.gain.exponentialRampToValueAtTime(0.28, now + 0.02);
                    g1.gain.exponentialRampToValueAtTime(0.0001, now + 0.18);
                    o1.connect(g1);
                    g1.connect(audioCtx.destination);
                    o1.start(now);
                    o1.stop(now + 0.2);
                    var o2 = audioCtx.createOscillator();
                    var g2 = audioCtx.createGain();
                    o2.type = 'sine';
                    o2.frequency.setValueAtTime(659, now + 0.10);
                    g2.gain.setValueAtTime(0.0001, now + 0.10);
                    g2.gain.exponentialRampToValueAtTime(0.30, now + 0.12);
                    g2.gain.exponentialRampToValueAtTime(0.0001, now + 0.40);
                    o2.connect(g2);
                    g2.connect(audioCtx.destination);
                    o2.start(now + 0.10);
                    o2.stop(now + 0.42);
                    });
                } catch(e) {}
            }
            function playFailSound() {
                if (!soundEnabled) return;
                try {
                    var p = ensureAudioRunning();
                    p.then(function() {
                    const now = audioCtx.currentTime;
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(220, now);
                    osc.frequency.exponentialRampToValueAtTime(80, now + 0.6);
                    gain.gain.setValueAtTime(0.0001, now);
                    gain.gain.exponentialRampToValueAtTime(0.25, now + 0.02);
                    gain.gain.exponentialRampToValueAtTime(0.15, now + 0.15);
                    gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.7);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start(now);
                    osc.stop(now + 0.72);
                    });
                } catch(e) {}
            }
            function playClickSound() {
                if (!soundEnabled) return;
                try {
                    var p = ensureAudioRunning();
                    p.then(function() {
                    const osc = audioCtx.createOscillator();
                    const env = audioCtx.createGain();
                    osc.type = 'sine';
                    osc.frequency.value = 1000;
                    osc.connect(env);
                    env.connect(audioCtx.destination);
                    const now = audioCtx.currentTime;
                    env.gain.setValueAtTime(0.0001, now);
                    env.gain.exponentialRampToValueAtTime(0.12, now + 0.005);
                    env.gain.exponentialRampToValueAtTime(0.0001, now + 0.05);
                    osc.start(now);
                    osc.stop(now + 0.07);
                    });
                } catch(e) {}
            }
            function updateSoundUI() {
                soundToggle.classList.toggle('muted', !soundEnabled);
                soundToggle.setAttribute('aria-pressed', String(soundEnabled));
            }



            function showRollingState(sides, count, results) {
                rollLabel.textContent = count === 1 ? 'D' + sides : count + 'D' + sides;
                diceResult.textContent = '...';
                diceResult.classList.remove('crit');
                diceDetail.innerHTML = '<span class="rolling-hint">骰子翻滚中…</span>';
                diceStage.innerHTML = '';
                for (let i = 0; i < count; i++) {
                    const dice = createDice3D(results[i], sides);
                    diceStage.appendChild(dice.stage);
                    animateDice(dice.cube);
                }
            }

            function showFinalResult(sides, count, results, total) {
                if (count === 1) {
                    showSingleResult(sides, results[0]);
                } else {
                    showMultiResult(sides, count, results, total);
                }
            }

            function showSingleResult(sides, value) {
                diceResult.textContent = value;
                rollLabel.textContent = 'D' + sides;
                diceResult.classList.remove('crit');
                let detail = '掷出 <strong>' + value + '</strong>';
                if (sides === 20) {
                    if (value === 20) {
                        diceResult.classList.add('crit');
                        detail += '<span class="crit-tag">大成功</span>';
                        playCritSound();
                    } else if (value === 1) {
                        detail += '<span class="crit-tag">大失败</span>';
                        playFailSound();
                    }
                }
                diceDetail.innerHTML = detail;
            }

            function showMultiResult(sides, count, results, total) {
                diceResult.textContent = total;
                rollLabel.textContent = count + 'D' + sides;
                const maxVal = Math.max.apply(null, results);
                let html = '<span class="multi-results">';
                results.forEach(function(val) {
                    let cls = 'single-die';
                    if (sides === 20) {
                        if (val === 20) cls += ' crit-success';
                        else if (val === 1) cls += ' crit-fail';
                        else if (val === maxVal) cls += ' highlight';
                    } else if (val === maxVal) {
                        cls += ' highlight';
                    }
                    html += '<span class="' + cls + '">' + val + '</span>';
                });
                html += '</span>';
                if (sides === 20) {
                    const critCount = results.filter(function(v){ return v === 20; }).length;
                    const failCount = results.filter(function(v){ return v === 1; }).length;
                    if (critCount > 0) {
                        html += ' <span class="crit-tag">大成功 ×' + critCount + '</span>';
                        playCritSound();
                    }
                    if (failCount > 0) {
                        html += ' <span class="crit-tag">大失败 ×' + failCount + '</span>';
                        if (critCount === 0) playFailSound();
                    }
                }
                diceDetail.innerHTML = html;
            }

            function addHistory(sides, count, results, total) {
                history.push({ dice: sides, count: count, results: results.slice(), total: total, timestamp: Date.now() });
                if (history.length > MAX_HISTORY) history.shift();
                renderHistory();
            }

            function rollDice(sides, count) {
                const results = [];
                for (let i = 0; i < count; i++) {
                    results.push(randomInt(1, sides));
                }
                const total = results.reduce(function(a, b) { return a + b; }, 0);
                return { results: results, total: total };
            }

            function renderHistory() {
                if (history.length === 0) {
                    historyList.innerHTML = '<span class="history-empty">还没有掷骰记录</span>';
                    return;
                }
                let html = '';
                history.slice().reverse().forEach(function(h) {
                    const label = h.count === 1 ? 'D' + h.dice : h.count + 'D' + h.dice;
                    const resultStr = h.count === 1 ? h.results[0] : h.total + ' (' + h.results.join(', ') + ')';
                    html += '<span class="history-item"><span class="h-dice">' + label + '</span> → <span class="h-result">' + resultStr + '</span></span>';
                });
                historyList.innerHTML = html;
            }



            function performRoll() {
                if (isRolling) return;
                const count = clampCount(parseInt(diceCountInput.value, 10));
                diceCountInput.value = count;
                const sides = currentDice;
                isRolling = true;
                rollBtn.disabled = true;

                const roll = rollDice(sides, count);
                showRollingState(sides, count, roll.results);
                playRollSound();

                const wait = prefersReducedMotion() ? 220 : ROLL_DURATION;
                setTimeout(function() {
                    playSettleSound();
                    showFinalResult(sides, count, roll.results, roll.total);
                    addHistory(sides, count, roll.results, roll.total);
                    isRolling = false;
                    rollBtn.disabled = false;
                }, wait);
            }

            function setActiveDice(sides) {
                currentDice = sides;
                diceBtns.forEach(function(btn) {
                    const val = parseInt(btn.dataset.dice, 10);
                    btn.classList.toggle('active', val === sides);
                });
                rollLabel.textContent = 'D' + sides;
                if (!isRolling && diceResult.textContent !== '...') {
                    showInitialDice();
                }
                if (diceResult.textContent === '—') {
                    diceDetail.textContent = '选择 D' + sides + '，点击掷骰';
                }
            }

            function showInitialDice() {
                diceStage.innerHTML = '';
                const count = clampCount(parseInt(diceCountInput.value, 10) || 1);
                for (let i = 0; i < count; i++) {
                    const dice = createDice3D('?', currentDice);
                    diceStage.appendChild(dice.stage);
                }
            }

            function createParticles() {
                const container = document.getElementById('particles');
                for (let i = 0; i < 10; i++) {
                    const p = document.createElement('span');
                    p.className = 'particle';
                    p.style.left = randomInt(0, 100) + '%';
                    p.style.animationDuration = randomInt(7, 14) + 's';
                    p.style.animationDelay = randomInt(0, 10) + 's';
                    p.style.opacity = (0.4 + Math.random() * 0.5).toFixed(2);
                    container.appendChild(p);
                }
            }

            diceBtns.forEach(function(btn) {
                btn.addEventListener('click', function() {
                    const sides = parseInt(this.dataset.dice, 10);
                    setActiveDice(sides);
                    playClickSound();
                });
            });

            rollBtn.addEventListener('click', function() {
                playClickSound();
                performRoll();
            });

            document.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && !e.repeat) performRoll();
            });

            diceCountInput.addEventListener('change', function() {
                this.value = clampCount(parseInt(this.value, 10));
                if (!isRolling) showInitialDice();
            });

            clearHistoryBtn.addEventListener('click', function() {
                history = [];
                renderHistory();
            });

            soundToggle.addEventListener('click', function() {
                soundEnabled = !soundEnabled;
                localStorage.setItem('dice-sound', soundEnabled ? 'on' : 'off');
                updateSoundUI();
                if (soundEnabled) playClickSound();
            });

            updateSoundUI();
            setActiveDice(6);
            showInitialDice();
            createParticles();
        })();
    </script>
</body>
</html>
